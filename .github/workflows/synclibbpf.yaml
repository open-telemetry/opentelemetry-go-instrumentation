name: Automatic libbpf Sync
on:
  workflow_dispatch:
    inputs:
        version:
          description: 'Version constraint'
          default: '< 1.5, >= 1.4.7'
          type: string
  schedule:
    - cron: '0 0 * * 0' # Sunday at midnight.

permissions:
  contents: read

jobs:
  synclibbpf:
    permissions:
      contents: write # required for pushing changes
      pull-requests: write # required for creating pull requests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: stable
          check-latest: true
          cache-dependency-path: "**/go.sum"
      - id: sync
        name: Sync libbpf
        run: make synclibbpf
        env:
          LIBBPF_VERSION: ${{ inputs.version }}
      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: Update libbpf version
          branch: automated/libbpf
          delete-branch: true
          title: '[chore] Update libbpf'
          body: |
            This is an automated PR to update the copied libbpf files.
            
            ### Update logs
            
            ```terminal
            ${{join(steps.sync.outputs.*, '\n')}}
            ```
